name: GitHub Trending Daily

on:
  schedule:
    - cron: "23 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-trending-daily
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Generate daily report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.6-luna' }}
          TRENDING_CANDIDATE_LIMIT: ${{ vars.TRENDING_CANDIDATE_LIMIT || '25' }}
          ACG_RELEVANCE_THRESHOLD: ${{ vars.ACG_RELEVANCE_THRESHOLD || '60' }}
          ACG_RADAR_CANDIDATE_LIMIT: ${{ vars.ACG_RADAR_CANDIDATE_LIMIT || '18' }}
          ACG_RADAR_LIMIT: ${{ vars.ACG_RADAR_LIMIT || '3' }}
          HISTORY_DEDUP_DAYS: ${{ vars.HISTORY_DEDUP_DAYS || '7' }}
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_SMTP_AUTH_CODE: ${{ secrets.QQ_SMTP_AUTH_CODE }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python -m github_trending_daily --limit 8 --send-email

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports data/snapshots data/candidates
          if git diff --cached --quiet; then
            echo "No new report to commit."
          else
            git commit -m "daily: GitHub Trending $(TZ=Asia/Shanghai date +%F)"
            git push
          fi

      - name: Send failure alert
        if: failure()
        continue-on-error: true
        env:
          QQ_EMAIL: ${{ secrets.QQ_EMAIL }}
          QQ_SMTP_AUTH_CODE: ${{ secrets.QQ_SMTP_AUTH_CODE }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: >-
          python -m github_trending_daily.failure_alert
          --run-url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
